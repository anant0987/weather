```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"> -->
    <title> Weather App </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-slate-100">
    <!-- Main container for the full weather app UI -->
    <div class="min-h-screen flex items-center justify-center px-4 py-10">
        <div class="w-full max-w-2xl rounded-3xl border border-white/10 bg-slate-950/60 p-6 shadow-2xl shadow-black/30 backdrop-blur-xl">
            <!-- App title and intro text -->
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold">Weather</h1>
                <p class="text-slate-400 mt-2">Enter a city name to get the current weather report.</p>
            </div>

            <!-- Search input and action buttons -->
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1">
                    <input id="cityInput" type="text" placeholder="Enter city name" class="w-full rounded-xl border border-white/10 bg-slate-900 px-4 py-3 text-sm outline-none focus:border-blue-500">
                    <div id="suggestionsBox" class="mt-2 hidden rounded-xl border border-white/10 bg-slate-900/95 p-2 shadow-lg shadow-black/20"></div>
                </div>
                <button id="searchBtn" class="rounded-xl bg-blue-600 px-5 py-3 font-semibold hover:bg-blue-500">Search</button>
            </div>

            <div class="mt-3 flex items-center">
                <input id="forecastToggle" type="checkbox" class="h-4 w-4 rounded border-white/20 bg-slate-900 text-blue-500 focus:ring-blue-500" checked>
                <label for="forecastToggle" class="ml-2 text-sm text-slate-300">Include next 5 days weather</label>
            </div>

            <!-- Status message area for errors or feedback -->
            <div id="statusBox" class="mt-4 hidden rounded-xl border border-rose-500/30 bg-rose-950/20 p-3 text-sm text-rose-300"></div>

            <!-- Weather result card shown after a successful search -->
            <div id="weatherCard" class="mt-6 hidden rounded-2xl border border-white/10 bg-slate-900/70 p-6">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div>
                        <p id="location" class="text-xl font-semibold"></p>
                        <p id="dateText" class="text-sm text-slate-400"></p>
                    </div>
                    <div class="text-right">
                        <div class="inline-flex items-center gap-2 rounded-full border border-emerald-400/30 bg-emerald-500/10 px-3 py-1 text-xs font-medium text-emerald-300">
                            <span class="live-dot h-2 w-2 rounded-full bg-emerald-400"></span>
                            Live now
                        </div>
                        <p id="liveTime" class="mt-2 text-sm text-slate-400"></p>
                        <p id="temp" class="text-5xl font-black"></p>
                        <p id="description" class="text-slate-300 capitalize"></p>
                    </div>
                </div>

                <!-- Additional weather details -->
                <div class="mt-6 grid gap-3 sm:grid-cols-4">
                    <div class="rounded-xl bg-slate-800/80 p-3">
                        <p class="text-xs uppercase tracking-wide text-slate-400">Feels like</p>
                        <p id="feelsLike" class="mt-1 font-semibold"></p>
                    </div>
                    <div class="rounded-xl bg-slate-800/80 p-3">
                        <p class="text-xs uppercase tracking-wide text-slate-400">Humidity</p>
                        <p id="humidity" class="mt-1 font-semibold"></p>
                    </div>
                    <div class="rounded-xl bg-slate-800/80 p-3">
                        <p class="text-xs uppercase tracking-wide text-slate-400">Wind</p>
                        <p id="wind" class="mt-1 font-semibold"></p>
                    </div>
                    <div class="rounded-xl bg-slate-800/80 p-3">
                        <p class="text-xs uppercase tracking-wide text-slate-400">Air quality</p>
                        <p id="airQuality" class="mt-1 font-semibold"></p>
                        <p id="airQualityLabel" class="mt-1 text-xs text-slate-400"></p>
                    </div>
                </div>
            </div>

            <div id="forecastSection" class="mt-6 hidden rounded-2xl border border-white/10 bg-slate-900/60 p-4">
                <h2 class="mb-3 text-lg font-semibold">Next 5 days</h2>
                <div id="forecastList" class="grid gap-3 sm:grid-cols-5"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

```
